<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windows 95</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ════════════════════════════════
     SPLASH / BOOT SCREEN
     Commented out for testing — uncomment for production:

<div id="boot-screen">
  <video id="boot-video" playsinline muted autoplay>
    <source src="mmjdxbwbsb3b1.mp4" type="video/mp4">
  </video>
</div>

     ════════════════════════════════ -->

<!-- ════════════════════════════════
     DESKTOP
     ════════════════════════════════ -->
<div id="desktop" onclick="desktopClick(event)" oncontextmenu="showContextMenu(event)">

  <!-- My Computer icon -->
  <div class="desktop-icon" id="icon-computer" style="top:16px;left:14px;"
       onclick="selectIcon(event,'icon-computer')" ondblclick="openWindow('computer')">
    <img src="img/my-computer.png" alt="My Computer">
    <span class="icon-label">My Computer</span>
  </div>

  <!-- My Files icon -->
  <div class="desktop-icon" id="icon-files" style="top:110px;left:14px;"
       onclick="selectIcon(event,'icon-files')" ondblclick="openWindow('files')">
    <img src="img/folder.png" alt="My Files">
    <span class="icon-label">My Files</span>
  </div>

  <!-- Internet Explorer icon -->
  <div class="desktop-icon" id="icon-ie" style="top:204px;left:14px;"
       onclick="selectIcon(event,'icon-ie')" ondblclick="openWindow('ie')">
    <img src="img/internet-explorer.png" alt="Internet Explorer">
    <span class="icon-label">Internet Explorer</span>
  </div>

  <!-- Recycle Bin icon -->
  <div class="desktop-icon" id="icon-recycle" style="top:298px;left:14px;"
       onclick="selectIcon(event,'icon-recycle')" ondblclick="openWindow('recycle')">
    <img src="img/recycle-bin.png" alt="Recycle Bin">
    <span class="icon-label">Recycle Bin</span>
  </div>

</div>

<!-- ════════════════════════════════
     TASKBAR
     ════════════════════════════════ -->
<div id="taskbar">

  <button id="start-btn" onclick="toggleStartMenu(event)"></button>

  <div class="taskbar-sep"></div>
  <div id="taskbar-windows"></div>
  <div class="taskbar-sep"></div>

  <div id="systray">
    <img src="img/speaker.ico" alt="Volume" id="systray-speaker">
    <span id="clock">12:00 PM</span>
  </div>

</div>

<!-- ════════════════════════════════
     START MENU
     ════════════════════════════════ -->
<div id="start-menu">
  <div class="start-menu-sidebar">
    <span>Windows 95</span>
  </div>
  <div class="start-menu-items">

    <div class="start-menu-item" onclick="openWindow('computer');closeStartMenu()">
      <img src="img/my-computer.png" alt="">
      <span class="item-text">My Computer</span>
    </div>

    <div class="start-menu-item" onclick="openWindow('files');closeStartMenu()">
      <img src="img/folder.png" alt="">
      <span class="item-text">My Files</span>
    </div>

    <div class="start-menu-item" onclick="openWindow('notepad');closeStartMenu()">
      <img src="img/notepad.png" alt="">
      <span class="item-text">Notepad</span>
    </div>

    <div class="start-menu-sep"></div>

    <div class="start-menu-item" onclick="openWindow('about');closeStartMenu()">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='2' y='4' width='28' height='24' fill='%23c0c0c0'/%3E%3Crect x='2' y='4' width='28' height='1' fill='%23fff'/%3E%3Crect x='2' y='4' width='1' height='24' fill='%23fff'/%3E%3Crect x='29' y='4' width='1' height='24' fill='%23808080'/%3E%3Crect x='2' y='27' width='28' height='1' fill='%23808080'/%3E%3Crect x='3' y='5' width='26' height='10' fill='%23000080'/%3E%3Ctext x='16' y='14' text-anchor='middle' fill='%23fff' font-size='8' font-family='Arial' font-weight='bold'%3EWin95%3C/text%3E%3Crect x='6' y='18' width='6' height='6' fill='%23ff3333'/%3E%3Crect x='13' y='18' width='6' height='6' fill='%2333cc33'/%3E%3Crect x='6' y='22' width='6' height='6' fill='%233399ff'/%3E%3Crect x='13' y='22' width='6' height='6' fill='%23ffcc00'/%3E%3C/svg%3E" alt="">
      <span class="item-text">About Windows 95</span>
    </div>

    <div class="start-menu-sep"></div>

    <div class="start-menu-item" onclick="showShutdown();closeStartMenu()">
      <div class="start-sprite-icon shutdown-img"></div>
      <span class="item-text">Shut Down...</span>
    </div>

  </div>
</div>

<!-- ════════════════════════════════
     CONTEXT MENU
     ════════════════════════════════ -->
<div id="context-menu">
  <div class="context-item grayed">Arrange Icons</div>
  <div class="context-item grayed">Line Up Icons</div>
  <div class="context-sep"></div>
  <div class="context-item" onclick="hideContextMenu()">Refresh</div>
  <div class="context-sep"></div>
  <div class="context-item" onclick="openWindow('about');hideContextMenu()">Properties</div>
</div>

<!-- ════════════════════════════════
     SHUTDOWN DIALOG
     ════════════════════════════════ -->
<div id="dialog-overlay">
  <div class="dialog-box">
    <div class="dialog-title">
      <svg width="14" height="14" viewBox="0 0 20 20">
        <rect x="0" y="0" width="9" height="9" fill="#ff3333"/>
        <rect x="11" y="0" width="9" height="9" fill="#33cc33"/>
        <rect x="0" y="11" width="9" height="9" fill="#3399ff"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffcc00"/>
      </svg>
      Shut Down Windows
    </div>
    <div class="dialog-body">
      <svg width="50" height="50" viewBox="0 0 32 32" style="flex-shrink:0;margin-top:4px;">
        <circle cx="16" cy="17" r="11" fill="#c0c0c0" stroke="#808080" stroke-width="1"/>
        <rect x="14" y="8" width="4" height="10" rx="2" fill="#404040"/>
        <path d="M10 12.5 A8 8 0 1 0 22 12.5" fill="none" stroke="#404040" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <div style="flex:1;">
        <p style="margin-bottom:10px;font-size:12px;">Are you sure you want to:</p>
        <div class="dialog-options">
          <label class="dialog-option">
            <input type="radio" name="shutdown-opt" value="shutdown" checked>
            Shut down the computer?
          </label>
          <label class="dialog-option">
            <input type="radio" name="shutdown-opt" value="restart">
            Restart the computer?
          </label>
          <label class="dialog-option">
            <input type="radio" name="shutdown-opt" value="msdos">
            Restart the computer in MS-DOS mode?
          </label>
        </div>
      </div>
    </div>
    <div class="dialog-footer">
      <button class="dialog-btn" onclick="doShutdownAction()">Yes</button>
      <button class="dialog-btn" onclick="hideDialog()">No</button>
      <button class="dialog-btn" onclick="hideDialog()">Help</button>
    </div>
  </div>
</div>

<script src="win95.js"></script>
</body>
</html>
