<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nat Miletic's Windows 95 Portfolio Website</title>
  <meta name="description" content="Step back into 1995 — Nat Miletic's interactive portfolio built as a fully functional Windows 95 desktop simulation. Explore files, open windows, and discover the story of a Calgary web designer and founder of Clio Websites, all wrapped in glorious retro UI.">
  <meta property="og:title" content="Nat Miletic's Windows 95 Portfolio Website">
  <meta property="og:description" content="Step back into 1995 — an interactive portfolio built as a fully functional Windows 95 desktop simulation. Explore files, open windows, and discover the story of a Calgary web designer.">
  <meta property="og:image" content="img/social-preview.jpg">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Nat Miletic's Windows 95 Portfolio Website">
  <meta name="twitter:description" content="Step back into 1995 — an interactive portfolio built as a fully functional Windows 95 desktop simulation.">
  <meta name="twitter:image" content="img/social-preview.jpg">
  <link rel="stylesheet" href="style.css?v=7e790a8">

</head>
<body>

<!-- ════════════════════════════════
     SPLASH / BOOT SCREEN
     Commented out for testing — uncomment for production:

<div id="boot-screen">
  <video id="boot-video" playsinline muted autoplay>
    <source src="mmjdxbwbsb3b1.mp4" type="video/mp4">
  </video>
</div>

     ════════════════════════════════ -->

<!-- ════════════════════════════════
     DESKTOP
     ════════════════════════════════ -->
<div id="desktop" onclick="desktopClick(event)" oncontextmenu="showContextMenu(event)">

  <!-- My Computer icon -->
  <div class="desktop-icon" id="icon-computer" style="top:16px;left:14px;"
       onclick="selectIcon(event,'icon-computer')" ondblclick="openWindow('computer')">
    <img src="img/my-computer.png" alt="My Computer">
    <span class="icon-label">My Computer</span>
  </div>

  <!-- My Files icon -->
  <div class="desktop-icon" id="icon-files" style="top:110px;left:14px;"
       onclick="selectIcon(event,'icon-files')" ondblclick="openWindow('files')">
    <img src="img/folder.png" alt="My Files">
    <span class="icon-label">My Files</span>
  </div>

  <!-- Internet Explorer icon -->
  <div class="desktop-icon" id="icon-ie" style="top:204px;left:14px;"
       onclick="selectIcon(event,'icon-ie')" ondblclick="openWindow('ie')">
    <img src="img/internet-explorer.png" alt="Internet Explorer">
    <span class="icon-label">Internet Explorer</span>
  </div>

  <!-- LinkedIn icon -->
  <div class="desktop-icon" id="icon-linkedin" style="top:392px;left:14px;"
       onclick="selectIcon(event,'icon-linkedin')" ondblclick="window.open('https://linkedin.com/in/natmiletic','_blank')">
    <img src="img/linkedin.png" alt="LinkedIn">
    <span class="icon-label">LinkedIn</span>
  </div>

  <!-- Recycle Bin icon -->
  <div class="desktop-icon" id="icon-recycle" style="top:298px;left:14px;"
       onclick="selectIcon(event,'icon-recycle')" ondblclick="openWindow('recycle')">
    <img src="img/recycle-bin.png" alt="Recycle Bin">
    <span class="icon-label">Recycle Bin</span>
  </div>

</div>

<!-- ════════════════════════════════
     TASKBAR
     ════════════════════════════════ -->
<div id="taskbar">

  <button id="start-btn" onclick="toggleStartMenu(event)"></button>

  <div class="taskbar-sep"></div>
  <div id="taskbar-windows"></div>
  <div class="taskbar-sep"></div>

  <div id="systray">
    <img src="img/speaker.png" alt="Volume" id="systray-speaker">
    <span id="clock">12:00 PM</span>
  </div>

</div>

<!-- ════════════════════════════════
     START MENU
     ════════════════════════════════ -->
<div id="start-menu">
  <div class="start-menu-sidebar">
    <span><strong>Windows</strong><span class="sidebar-95">95</span></span>
  </div>
  <div class="start-menu-items">

    <div class="start-menu-item" onclick="openWindow('computer');closeStartMenu()">
      <img src="img/my-computer.png" alt="">
      <span class="item-text">My Computer</span>
    </div>

    <div class="start-menu-item" onclick="openWindow('files');closeStartMenu()">
      <img src="img/folder.png" alt="">
      <span class="item-text">My Files</span>
    </div>

    <div class="start-menu-item" onclick="openWindow('notepad');closeStartMenu()">
      <img src="img/notepad.png" alt="">
      <span class="item-text">Notepad</span>
    </div>

    <div class="start-menu-item" onclick="openWindow('welcome');closeStartMenu()">
      <img src="img/welcome.png" alt="">
      <span class="item-text">Welcome</span>
    </div>

    <div class="start-menu-sep"></div>

    <div class="start-menu-item" onclick="showShutdown();closeStartMenu()">
      <img src="img/shutdown.ico" alt="" style="width:24px;height:24px;image-rendering:pixelated;flex-shrink:0;">
      <span class="item-text">Shut Down...</span>
    </div>

  </div>
</div>

<!-- ════════════════════════════════
     CONTEXT MENU
     ════════════════════════════════ -->
<div id="context-menu">
  <div class="context-item grayed">Arrange Icons</div>
  <div class="context-item grayed">Line Up Icons</div>
  <div class="context-sep"></div>
  <div class="context-item" onclick="hideContextMenu()">Refresh</div>
  <div class="context-sep"></div>
  <div class="context-item" onclick="openWindow('about');hideContextMenu()">Properties</div>
</div>


<script src="win95.js?v=7e790a8"></script>
</body>
</html>
